<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dominio en Venta</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000, #1a1a1a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      border: 4px solid #00ffcc;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 30px #00ffcc;
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #00ffcc; }
      to { box-shadow: 0 0 40px #00ffcc; }
    }

    h1 {
      font-size: 60px;
      margin: 0;
      color: #00ffcc;
    }

    h2 {
      margin-top: 10px;
      font-weight: normal;
      color: #ccc;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 30px;
      background: #00ffcc;
      color: black;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>DOMINIO A LA VENTA</h1>
    <h2>Este dominio está disponible</h2>

    <a href="https://wa.me/549XXXXXXXXXX" class="btn">
      CONTACTAR POR WHATSAPP
    </a>

    <div class="footer">
      Consultas serias únicamente
    </div>
  </div>

</body>
</html>
