<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡¡¡BIENVENIDO A INTERNET!!!</title>

  <style>
    body {
      margin: 0;
      font-family: "Comic Sans MS", Arial, sans-serif;
      background-color: #ffe44d;
      text-align: center;
    }

    .topbar {
      background: red;
      color: white;
      font-weight: bold;
      padding: 10px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.5; }
    }

    h1 {
      font-size: 60px;
      color: blue;
      text-shadow: 4px 4px white, 8px 8px black;
    }

    .box {
      background: lightblue;
      border: 6px solid black;
      margin: 20px;
      padding: 20px;
    }

    .btn {
      display: inline-block;
      background: lime;
      padding: 10px 20px;
      margin: 10px;
      border: 4px outset gray;
      font-weight: bold;
    }

    .counter {
      background: black;
      color: lime;
      display: inline-block;
      padding: 10px;
      margin-top: 20px;
      font-family: monospace;
    }
  </style>
</head>

<body>

<audio autoplay>
  <source src="https://www.soundjay.com/button/beep-07.mp3" type="audio/mpeg">
</audio>

<div class="topbar">¡¡¡ATENCION!!! ESTA PAGINA ES INNECESARIA!!!</div>

<h1>¡¡¡BIENVENIDO A INTERNET!!!</h1>

<div class="box">
  <h2>Esta no es la pagina que estabas buscando.</h2>

  <p>
    Pero ya que llegaste...<br>
    fingí que todo esto fue intencional.
  </p>

  <div class="btn">SEGUIR MIRANDO</div>
  <div class="btn">TOCAR COSAS</div>
</div>

<div class="counter">
  VISITANTE N° <span id="contador">000001</span>
</div>

<script>
  document.getElementById("contador").textContent =
    Math.floor(Math.random() * 900000) + 100000;

  window.onload = function() {
    alert("ATENCION: Usted ha ingresado a internet.");
  };

  window.addEventListener("click", function () {
    new Audio("https://www.soundjay.com/button/beep-07.mp3").play();
  }, { once: true });
</script>

</body>
</html>
