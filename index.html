<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error de navegación</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(45deg, #001f5c, #003b8e, #005eff);
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 22px;
      color: #cfcfcf;
      margin-bottom: 40px;
    }

    .box {
      background: rgba(0, 0, 0, 0.4);
      padding: 30px;
      border-radius: 10px;
    }

    .message {
      font-size: 28px;
      font-weight: bold;
      line-height: 1.4;
    }

    .small {
      margin-top: 25px;
      font-size: 20px;
      color: #dcdcdc;
      line-height: 1.6;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #aaa;
    }

    @media (max-width: 600px) {
      h1 { font-size: 34px; }
      .message { font-size: 22px; }
      .small { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <h1>Ruta incorrecta.</h1>
    <div class="subtitle">Recalculando…</div>

    <div class="box">
      <div class="message">
        Esta no es la página que estabas buscando.
      </div>

      <div class="small">
        Te desviaste del rumbo.<br><br>
        Pero a veces…<br>
        <strong>terminar en otro lugar es lo mejor que puede pasar.</strong>
      </div>
    </div>

    <div class="footer">
      Este dominio ha cambiado de dirección.
    </div>

  </div>
</body>
</html>
